server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:

    gateway:
      mvc:
        routes:

          - id: order-service

            uri: http://localhost:8081

            predicates:

              - Path=/api/orders/**

management:

  endpoints:

    web:

      exposure:

        include:
          - health
          - info


  endpoint:

    health:

      show-details: always

