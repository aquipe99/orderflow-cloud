

server:
  port: 8082

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5434/orderflow
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  kafka:

    bootstrap-servers: localhost:29092

management:

  endpoints:

    web:

      exposure:

        include:
          - health
          - info

orderflow:

  kafka:

    topics:

      order-created: orders.created

      inventory-reserved: inventory.reserved
