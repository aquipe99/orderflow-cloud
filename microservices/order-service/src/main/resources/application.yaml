

server:
  port: 8081

spring:

  application:
    name: order-service



  datasource:

    url: jdbc:postgresql://localhost:5434/order_db

    username: postgres

    password: password

    driver-class-name: org.postgresql.Driver



  jpa:

    hibernate:

      ddl-auto: validate


    show-sql: false


    properties:

      hibernate:

        format_sql: true



  flyway:

    enabled: true

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

orderflow:
   kafka:
     topics:
       order-created: orders.created
       order-updated: orders.updated
       order-cancelled: orders.cancelled

management:

  endpoints:

    web:

      exposure:

        include:

          - health
          - info
